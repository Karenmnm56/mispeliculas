{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-4 text-center">
                    🎬 Película
                </h2>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <!-- Título -->
                    <div class="mb-3">
                        <label>Título</label>
                        <input type="text"
                               name="title"
                               class="form-control"
                               value="{{ movie.title|default:'' }}">
                    </div>

                    <!-- Descripción -->
                    <div class="mb-3">
                        <label>Descripción</label>
                        <textarea name="description"
                                  class="form-control">{{ movie.description|default:'' }}</textarea>
                    </div>

                    <!-- Precio -->
                    <div class="mb-3">
                        <label>Precio</label>
                        <input type="number"
                               step="0.01"
                               name="price"
                               class="form-control"
                               value="{{ movie.price|default:'' }}">
                    </div>

                    <!-- Stock -->
                    <div class="mb-3">
                        <label>Stock</label>
                        <input type="number"
                               name="stock"
                               class="form-control"
                               value="{{ movie.stock|default:'' }}">
                    </div>

                    <!-- Imagen -->
                    <div class="mb-3">
                        <label>Imagen</label>
                        <input type="file"
                               name="image"
                               class="form-control">
                    </div>

                    <!-- BOTÓN -->
                    <button class="btn btn-primary w-100">
                        Guardar
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
